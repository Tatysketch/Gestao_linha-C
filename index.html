<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA TÁTICO P2M - VISÃO GERAL DA LINHA</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: #ccc; padding: 20px; margin: 0; }
        .container { max-width: 1450px; margin: auto; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; margin-bottom: 20px; position: sticky; top: 0; background: #0a0a0a; z-index: 100; padding: 10px 0; }
        h1 { color: #d4a017; text-transform: uppercase; font-size: 18px; letter-spacing: 1px; margin: 0; }

        .layout-vertical { display: flex; flex-direction: column; gap: 40px; }
        
        /* Blocos de Setor */
        .setor-bloco { background: #111; border: 1px solid #222; border-radius: 8px; padding: 20px; }
        .setor-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .setor-nome { color: #d4a017; font-size: 20px; font-weight: bold; text-transform: uppercase; }

        /* Mapa de Calor */
        .heat-map-container { flex-grow: 1; max-width: 400px; margin: 0 20px; }
        .bar-container { background: #222; height: 15px; border-radius: 10px; overflow: hidden; margin-top: 5px; border: 1px solid #333; }
        .bar-fill { height: 100%; width: 0%; transition: 0.5s; background: linear-gradient(90deg, #ff4b2b, #ffb400, #2ecc71); }

        /* Tabela */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { color: #888; text-transform: uppercase; font-size: 10px; text-align: center; padding: 12px; border-bottom: 1px solid #333; background: #1a1a1a; }
        td { padding: 8px; border-bottom: 1px solid #1a1a1a; text-align: center; }

        /* Status REPS */
        .status-reps { font-weight: bold; font-size: 9px; padding: 4px 8px; border-radius: 4px; text-transform: uppercase; }
        .reps-verde { color: #2ecc71; background: rgba(46, 204, 113, 0.1); border: 1px solid #2ecc71; }
        .reps-amarelo { color: #f1c40f; background: rgba(241, 196, 15, 0.1); border: 1px solid #f1c40f; }
        .reps-vermelho { color: #e74c3c; background: rgba(231, 76, 60, 0.1); border: 1px solid #e74c3c; }

        /* Inputs */
        .input-metrica { background: #000; color: #d4a017; border: 1px solid #333; padding: 6px; border-radius: 4px; width: 55px; text-align: center; font-weight: bold; }
        .obs-input { background: #000; color: #eee; border: 1px solid #333; padding: 8px; border-radius: 4px; width: 100%; outline: none; font-size: 11px; }
        
        .controles-cadastro { display: flex; gap: 10px; align-items: center; }
        .btn { background: #d4a017; color: #000; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 10px; }
        .btn-export { background: #333; color: #fff; }
        
        .metrica-resumo { font-size: 12px; font-weight: bold; color: #aaa; }
        .valor-resumo { color: #d4a017; font-size: 16px; }
        .ausente { opacity: 0.3; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>CONTROLE TÁTICO // LINHA C COMPLETA</h1>
        <div style="display: flex; gap: 15px;">
            <button class="btn btn-export" onclick="exportarRelatorio()">📥 EXPORTAR CSV GERAL</button>
            <div id="data-atual" style="font-size: 12px; color: #666; align-self: center;"></div>
        </div>
    </header>

    <div class="layout-vertical">
        <section class="setor-bloco" id="bloco-CHECKIN">
            <div class="setor-header">
                <span class="setor-nome">1. CHECKIN</span>
                <div class="heat-map-container">
                    <div class="bar-container"><div id="barra-CHECKIN" class="bar-fill"></div></div>
                </div>
                <div class="metrica-resumo">PERF: <span class="valor-resumo" id="perf-CHECKIN">0%</span> | PRES: <span id="pres-CHECKIN">0/0</span></div>
                <div class="controles-cadastro">
                    <input type="text" id="add-CHECKIN" class="obs-input" style="width: 150px;" placeholder="Nome Operador...">
                    <button class="btn" onclick="adicionar('CHECKIN')">+</button>
                </div>
            </div>
            <table>
                <thead>
                    <tr><th>PRES</th><th style="text-align:left;">OPERADOR</th><th>PROD%</th><th>MU%</th><th>OCIO%</th><th>OBSERVAÇÕES DO DIA</th><th>MAPA REPS</th><th></th></tr>
                </thead>
                <tbody id="corpo-CHECKIN"></tbody>
            </table>
        </section>

        <section class="setor-bloco" id="bloco-P2M">
            <div class="setor-header">
                <span class="setor-nome">2. P2M</span>
                <div class="heat-map-container">
                    <div class="bar-container"><div id="barra-P2M" class="bar-fill"></div></div>
                </div>
                <div class="metrica-resumo">PERF: <span class="valor-resumo" id="perf-P2M">0%</span> | PRES: <span id="pres-P2M">0/0</span></div>
                <div class="controles-cadastro">
                    <input type="text" id="add-P2M" class="obs-input" style="width: 150px;" placeholder="Nome Operador...">
                    <button class="btn" onclick="adicionar('P2M')">+</button>
                </div>
            </div>
            <table>
                <thead>
                    <tr><th>PRES</th><th style="text-align:left;">OPERADOR</th><th>PROD%</th><th>MU%</th><th>OCIO%</th><th>OBSERVAÇÕES DO DIA</th><th>MAPA REPS</th><th></th></tr>
                </thead>
                <tbody id="corpo-P2M"></tbody>
            </table>
        </section>

        <section class="setor-bloco" id="bloco-SORTING">
            <div class="setor-header">
                <span class="setor-nome">3. SORTING</span>
                <div class="heat-map-container">
                    <div class="bar-container"><div id="barra-SORTING" class="bar-fill"></div></div>
                </div>
                <div class="metrica-resumo">PERF: <span class="valor-resumo" id="perf-SORTING">0%</span> | PRES: <span id="pres-SORTING">0/0</span></div>
                <div class="controles-cadastro">
                    <input type="text" id="add-SORTING" class="obs-input" style="width: 150px;" placeholder="Nome Operador...">
                    <button class="btn" onclick="adicionar('SORTING')">+</button>
                </div>
            </div>
            <table>
                <thead>
                    <tr><th>PRES</th><th style="text-align:left;">OPERADOR</th><th>PROD%</th><th>MU%</th><th>OCIO%</th><th>OBSERVAÇÕES DO DIA</th><th>MAPA REPS</th><th></th></tr>
                </thead>
                <tbody id="corpo-SORTING"></tbody>
            </table>
        </section>
    </div>
</div>

<script>
const STORAGE_KEY = 'LINHA_C_UNIFICADA_V7';
let db = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { "CHECKIN": {}, "P2M": {}, "SORTING": {} };

function adicionar(setor) {
    const input = document.getElementById(`add-${setor}`);
    const nome = input.value.trim().toUpperCase();
    if (nome === "") return;
    if (Object.keys(db[setor]).length >= 100) return alert("Limite de 100 atingido!");
    
    if (!db[setor][nome]) {
        db[setor][nome] = { presente: true, prod: 0, mu: 0, ocio: 0, obs: "" };
        input.value = "";
        salvarETela();
    }
}

function atualizar(setor, nome, campo, valor) {
    db[setor][nome][campo] = valor;
    salvarETela();
}

function salvarETela() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
    renderizarTudo();
}

function calcularStatus(prod, mu, ocio) {
    if (prod >= 85 && mu >= 80 && ocio <= 10) return { txt: "PERFIL REPS", classe: "reps-verde", score: 100 };
    if (ocio > 25 || prod < 50) return { txt: "GARGALO", classe: "reps-vermelho", score: 30 };
    return { txt: "DESENVOLV.", classe: "reps-amarelo", score: 65 };
}

function renderizarTudo() {
    ["CHECKIN", "P2M", "SORTING"].forEach(setor => {
        const corpo = document.getElementById(`corpo-${setor}`);
        corpo.innerHTML = "";
        let somaPerf = 0, pres = 0;
        const nomes = Object.keys(db[setor]).sort();

        nomes.forEach(nome => {
            const d = db[setor][nome];
            if(d.presente) pres++;
            const statusInfo = calcularStatus(d.prod, d.mu, d.ocio);
            if(d.presente) somaPerf += statusInfo.score;

            const tr = document.createElement('tr');
            if(!d.presente) tr.className = 'ausente';
            tr.innerHTML = `
                <td><input type="checkbox" ${d.presente?'checked':''} onchange="atualizar('${setor}','${nome}','presente',this.checked)"></td>
                <td style="text-align:left; font-weight:bold; font-size:12px;">${nome}</td>
                <td><input type="number" class="input-metrica" value="${d.prod}" onchange="atualizar('${setor}','${nome}','prod',parseInt(this.value))"></td>
                <td><input type="number" class="input-metrica" value="${d.mu}" onchange="atualizar('${setor}','${nome}','mu',parseInt(this.value))"></td>
                <td><input type="number" class="input-metrica" value="${d.ocio}" onchange="atualizar('${setor}','${nome}','ocio',parseInt(this.value))"></td>
                <td><input type="text" class="obs-input" value="${d.obs}" onchange="atualizar('${setor}','${nome}','obs',this.value.toUpperCase())"></td>
                <td><span class="status-reps ${statusInfo.classe}">${statusInfo.txt}</span></td>
                <td><button onclick="if(confirm('Remover?')){delete db['${setor}']['${nome}'];salvarETela();}" style="background:none;border:none;color:#333;cursor:pointer;">✖</button></td>
            `;
            corpo.appendChild(tr);
        });

        const media = pres > 0 ? (somaPerf / pres).toFixed(0) : 0;
        document.getElementById(`perf-${setor}`).innerText = media + "%";
        document.getElementById(`pres-${setor}`).innerText = `${pres}/${nomes.length}`;
        document.getElementById(`barra-${setor}`).style.width = media + "%";
    });
}

function exportarRelatorio() {
    let csv = "Setor;Operador;Prod;MU;Ocio;Status;Observacao\n";
    ["CHECKIN", "P2M", "SORTING"].forEach(s => {
        Object.keys(db[s]).forEach(n => {
            let d = db[s][n];
            csv += `${s};${n};${d.prod}%;${d.mu}%;${d.ocio}%;${calcularStatus(d.prod, d.mu, d.ocio).txt};${d.obs}\n`;
        });
    });
    const blob = new Blob([csv], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `relatorio_completo_linha_c.csv`;
    a.click();
}

document.getElementById('data-atual').innerText = new Date().toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });
window.onload = renderizarTudo;
</script>
</body>
</html>
