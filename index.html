<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA TÁTICO P2M - DASHBOARD</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: #ccc; padding: 20px; margin: 0; }
        .container { max-width: 1400px; margin: auto; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; margin-bottom: 20px; }
        h1 { color: #d4a017; text-transform: uppercase; font-size: 20px; letter-spacing: 1px; }

        .grid-layout { display: grid; grid-template-columns: 1fr 300px; gap: 20px; }

        .heat-map-container { background: #111; padding: 15px; border-radius: 6px; border: 1px solid #222; margin-bottom: 20px; }
        .bar-container { background: #222; height: 25px; border-radius: 12px; overflow: hidden; margin-top: 10px; border: 1px solid #333; }
        .bar-fill { height: 100%; width: 0%; transition: 0.5s; background: linear-gradient(90deg, #ff4b2b, #ffb400, #2ecc71); }

        .card-gestao { background: #111; padding: 15px; border-radius: 6px; border: 1px solid #222; overflow-x: auto; max-height: 600px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th { color: #888; text-transform: uppercase; font-size: 10px; text-align: center; padding: 10px; border-bottom: 1px solid #333; position: sticky; top: 0; background: #111; }
        td { padding: 8px; border-bottom: 1px solid #1a1a1a; text-align: center; }

        .status-reps { font-weight: bold; font-size: 10px; padding: 4px 8px; border-radius: 4px; text-transform: uppercase; }
        .reps-verde { color: #2ecc71; background: rgba(46, 204, 113, 0.1); border: 1px solid #2ecc71; }
        .reps-amarelo { color: #f1c40f; background: rgba(241, 196, 15, 0.1); border: 1px solid #f1c40f; }
        .reps-vermelho { color: #e74c3c; background: rgba(231, 76, 60, 0.1); border: 1px solid #e74c3c; }

        .input-metrica { background: #000; color: #d4a017; border: 1px solid #333; padding: 6px; border-radius: 4px; width: 60px; text-align: center; font-weight: bold; }
        .obs-input { background: #000; color: #eee; border: 1px solid #333; padding: 8px; border-radius: 4px; width: 100%; outline: none; font-size: 12px; }
        .obs-input:focus { border-color: #d4a017; }

        .btn { background: #d4a017; color: #000; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 11px; }
        .btn-export { background: #333; color: #fff; margin-top: 10px; width: 100%; }
        
        .secao-lateral { display: flex; flex-direction: column; gap: 20px; }
        .metrica-quadrado { background: #111; padding: 15px; border-radius: 6px; text-align: center; border: 1px solid #222; }
        .metrica-quadrado span { font-size: 10px; color: #666; text-transform: uppercase; display: block; }
        .valor { font-size: 24px; font-weight: bold; color: #d4a017; }
        .ausente { opacity: 0.3; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>CONTROLE DE LINHA // ANALYTICS LÍDER</h1>
        <div id="data-atual" style="font-size: 12px; color: #666;"></div>
    </header>

    <div class="grid-layout">
        <main>
            <div class="heat-map-container">
                <span style="font-size: 11px; color: #888; text-transform: uppercase;">🔥 Performance e Desenvolvimento REPS</span>
                <div class="bar-container">
                    <div id="barra-progresso" class="bar-fill"></div>
                </div>
            </div>

            <div class="card-gestao">
                <table>
                    <thead>
                        <tr>
                            <th>PRES</th>
                            <th style="text-align:left;">COLABORADOR</th>
                            <th>PROD (%)</th>
                            <th>MU (%)</th>
                            <th>OCIOSO (%)</th>
                            <th>O QUE HOUVE HOJE?</th>
                            <th>MAPA REPS</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="corpo-tabela"></tbody>
                </table>
            </div>
        </main>

        <aside class="secao-lateral">
            <div class="metrica-quadrado" style="border-left: 4px solid #d4a017;">
                <input type="text" id="novo-nome" class="obs-input" placeholder="Novo Operador..." style="margin-bottom: 10px;">
                <button class="btn" onclick="adicionarColaborador()" style="width: 100%;">CADASTRAR</button>
                <p id="contagem-limite" style="font-size: 9px; color: #555; margin-top: 5px;">Limite: 0/200</p>
            </div>
            <div class="metrica-quadrado">
                <span>PRESENÇA REAL</span><span class="valor" id="presenca-real">0/0</span>
            </div>
            <div class="metrica-quadrado">
                <span>PERFORMANCE MÉDIA</span><span class="valor" id="media-geral">0%</span>
            </div>
            <button class="btn btn-export" onclick="exportarRelatorio()">📥 EXPORTAR RELATÓRIO</button>
            <button class="btn" style="background: #222; color: #888; margin-top: 5px;" onclick="forcarSalvamento()">💾 SALVAR HISTÓRICO AGORA</button>
        </aside>
    </div>
</div>

<script>
// USANDO UMA CHAVE ÚNICA PARA EVITAR PERDA DE DADOS
const STORAGE_KEY = 'LINHA_C_PERFORMANCE_FINAL';
let dadosGestao = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};

function adicionarColaborador() {
    const nomeInput = document.getElementById('novo-nome');
    const nome = nomeInput.value.trim().toUpperCase();
    
    // VERIFICAÇÃO DE LIMITE (200 NOMES)
    const totalAtual = Object.keys(dadosGestao).length;
    
    if (nome === "") return;
    if (totalAtual >= 200) {
        alert("Limite de 200 colaboradores atingido!");
        return;
    }
    
    if (!dadosGestao[nome]) {
        dadosGestao[nome] = { presente: true, prod: 0, mu: 0, ocio: 0, obs: "" };
        nomeInput.value = "";
        salvarETela();
    } else {
        alert("Este colaborador já está na lista!");
    }
}

function atualizarMétrica(nome, campo, valor) {
    if (dadosGestao[nome]) {
        dadosGestao[nome][campo] = valor;
        salvarETela();
    }
}

function forcarSalvamento() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(dadosGestao));
    alert("Histórico da Linha C salvo com sucesso!");
}

function salvarETela() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(dadosGestao));
    atualizarInterface();
}

function calcularStatus(prod, mu, ocio) {
    if (prod >= 85 && mu >= 80 && ocio <= 10) return { txt: "PERFIL REPS", classe: "reps-verde", score: 100 };
    if (ocio > 25 || prod < 50) return { txt: "GARGALO", classe: "reps-vermelho", score: 30 };
    return { txt: "DESENVOLV.", classe: "reps-amarelo", score: 65 };
}

function exportarRelatorio() {
    let csv = "Colaborador;Produtividade;MU;Ociosidade;Observacao;Status\n";
    Object.keys(dadosGestao).forEach(n => {
        let d = dadosGestao[n];
        let status = calcularStatus(d.prod, d.mu, d.ocio).txt;
        csv += `${n};${d.prod}%;${d.mu}%;${d.ocio}%;${d.obs};${status}\n`;
    });
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.setAttribute('href', url);
    a.setAttribute('download', `analise_reps_linha_c.csv`);
    a.click();
}

function atualizarInterface() {
    const corpo = document.getElementById('corpo-tabela');
    corpo.innerHTML = "";
    let somaPerformance = 0, presentes = 0, total = 0;

    const nomesOrdenados = Object.keys(dadosGestao).sort();
    total = nomesOrdenados.length;

    nomesOrdenados.forEach(nome => {
        const d = dadosGestao[nome];
        if(d.presente) { presentes++; }

        const statusInfo = calcularStatus(d.prod, d.mu, d.ocio);
        if(d.presente) somaPerformance += statusInfo.score;

        const tr = document.createElement('tr');
        if(!d.presente) tr.className = 'ausente';

        tr.innerHTML = `
            <td><input type="checkbox" ${d.presente?'checked':''} onchange="atualizarMétrica('${nome}', 'presente', this.checked)"></td>
            <td style="text-align:left; font-weight:bold; font-size:13px;">${nome}</td>
            <td><input type="number" class="input-metrica" value="${d.prod}" onchange="atualizarMétrica('${nome}', 'prod', parseInt(this.value))"></td>
            <td><input type="number" class="input-metrica" value="${d.mu}" onchange="atualizarMétrica('${nome}', 'mu', parseInt(this.value))"></td>
            <td><input type="number" class="input-metrica" value="${d.ocio}" onchange="atualizarMétrica('${nome}', 'ocio', parseInt(this.value))"></td>
            <td><input type="text" class="obs-input" placeholder="..." value="${d.obs}" onchange="atualizarMétrica('${nome}', 'obs', this.value.toUpperCase())"></td>
            <td><span class="status-reps ${statusInfo.classe}">${statusInfo.txt}</span></td>
            <td><button onclick="if(confirm('Remover?')) {delete dadosGestao['${nome}']; salvarETela();}" style="background:none; border:none; color:#444; cursor:pointer;">✖</button></td>
        `;
        corpo.appendChild(tr);
    });

    document.getElementById('contagem-limite').innerText = `Limite: ${total}/200`;
    document.getElementById('presenca-real').innerText = `${presentes}/${total}`;
    const mediaGeral = presentes > 0 ? (somaPerformance / presentes).toFixed(0) : 0;
    document.getElementById('media-geral').innerText = mediaGeral + "%";
    document.getElementById('barra-progresso').style.width = mediaGeral + "%";
}

document.getElementById('data-atual').innerText = new Date().toLocaleDateString('pt-BR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
window.onload = atualizarInterface;
</script>
</body>
</html>
